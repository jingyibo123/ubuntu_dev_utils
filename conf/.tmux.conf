# Screen-friendly, TUI-safe tmux config
# Goal: easy migration from GNU screen, minimal surprises for TUIs.

# Use Ctrl-a like screen
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Keep numbering more intuitive for screen users
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Stability / compatibility first
set-option -g default-terminal "__DEFAULT_TERMINAL__"
set-option -g mouse off
set-option -g focus-events off
set-option -g history-limit 50000
set-option -g status-keys emacs
set-window-option -g mode-keys emacs

# Start with a clean minimal status line behavior
set-option -g status-position bottom
set-option -g display-time 2000

# Reload config quickly
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind-key C-r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Core screen-like workflow: both C-a c and C-a C-c work, same for others
bind-key c   new-window
bind-key C-c new-window

bind-key n   next-window
bind-key C-n next-window

bind-key p   previous-window
bind-key C-p previous-window

bind-key d   detach-client
bind-key C-d detach-client

bind-key k   confirm-before -p "kill window #W? (y/n)" kill-window
bind-key C-k confirm-before -p "kill window #W? (y/n)" kill-window

# Useful interactive choosers
bind-key w   choose-window
bind-key C-w choose-window
bind-key s   choose-session
bind-key C-s choose-session

# Split panes only on explicit request; keep screen-style usage centered on windows
bind-key '|' split-window -h
bind-key '-' split-window -v

# Preserve common default kill binding too
bind-key '&' confirm-before -p "kill window #W? (y/n)" kill-window

